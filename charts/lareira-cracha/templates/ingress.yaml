{{- if .Values.enabled }}
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
  annotations:
    # Saguão self-reference: crachá's REST surface is gated by passaporte
    # forward-auth via the pleme-lib helper. The chart deploying crachá
    # is itself part of saguão, so this is the canonical pattern.
    nginx.ingress.kubernetes.io/auth-url: "http://authentik.identity.svc.cluster.local:9000/outpost.goauthentik.io/auth/nginx"
    nginx.ingress.kubernetes.io/auth-signin: "https://$host/outpost.goauthentik.io/start?rd=$escaped_request_uri"
    nginx.ingress.kubernetes.io/auth-response-headers: "Set-Cookie,X-authentik-username,X-authentik-groups,X-authentik-email,X-authentik-name,X-authentik-uid"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.hostname }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lareira-cracha.fullname" . }}
                port:
                  name: http
{{- end }}
{{- end }}
