{{- if .Values.enabled }}
{{- if .Values.serviceMonitor.enabled }}
apiVersion: operator.victoriametrics.com/v1beta1
kind: VMServiceScrape
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "lareira-cracha.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.serviceMonitor.interval }}
      path: /metrics
{{- end }}
{{- end }}
