{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate    # single-replica controller; no parallel reconcilers
  selector:
    matchLabels:
      {{- include "lareira-cracha.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lareira-cracha.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lareira-cracha.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["cracha-api"]
          env:
            - name: CRACHA_API_REST_ADDR
              value: "0.0.0.0:8080"
            - name: CRACHA_API_GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: RUST_LOG
              value: "{{ .Values.logLevel }}"
            # Postgres connection — sourced from the SOPS-encrypted
            # database Secret. Defaults assume CNPG (pleme-database)
            # in the same cluster; consumers can override secret name
            # / keys per-deployment.
            - name: CRACHA_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.secretName | quote }}
                  key: {{ .Values.database.secretKey | quote }}
            # Admin allowlist — declarative source of truth for who
            # gets the admin role on first login. Comma-separated,
            # lowercase comparison. shikumi-loaded in production via
            # an extraEnv override; the chart default is empty.
            - name: CRACHA_ADMIN_EMAILS
              value: {{ .Values.adminEmails | default "" | quote }}
          {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9100
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
{{- end }}
