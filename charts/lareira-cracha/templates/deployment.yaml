apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate    # single-replica controller; no parallel reconcilers
  selector:
    matchLabels:
      {{- include "lareira-cracha.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "lareira-cracha.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "lareira-cracha.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["cracha-api"]
          env:
            - name: CRACHA_API_REST_ADDR
              value: "0.0.0.0:8080"
            - name: CRACHA_API_GRPC_ADDR
              value: "0.0.0.0:50051"
            - name: RUST_LOG
              value: "{{ .Values.logLevel }}"
          ports:
            - name: http
              containerPort: 8080
            - name: grpc
              containerPort: 50051
            - name: metrics
              containerPort: 9100
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
