{{- if .Values.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "lareira-cracha.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
---
# crachá-controller needs cluster-wide read on AccessPolicy +
# ServiceCatalog CRDs (it reconciles them into an in-memory index).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
rules:
  - apiGroups: ["saguao.pleme.io"]
    resources: ["accesspolicies", "accessgroups", "servicecatalogs"]
    verbs: ["get", "list", "watch"]
  # Status updates if/when we add a status subresource.
  - apiGroups: ["saguao.pleme.io"]
    resources: ["accesspolicies/status", "servicecatalogs/status"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "lareira-cracha.fullname" . }}
  labels:
    {{- include "lareira-cracha.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "lareira-cracha.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "lareira-cracha.fullname" . }}
{{- end }}
