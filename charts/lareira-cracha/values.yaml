# lareira-cracha values
#
# Sane defaults for the saguão control-plane cluster (today: rio).
# Each consumer cluster's HelmRelease overrides .image.tag, .resources,
# and the ingress hostname.

enabled: true

nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/pleme-io/cracha
  tag: ""                   # default to chart appVersion
  pullPolicy: IfNotPresent

# Pod imagePullSecrets — list of {name: <secret-in-same-namespace>}.
# Required when pulling private pleme-io images from ghcr.io (the
# package is private; anonymous pulls return 401). Override per
# deployment with `[{name: ghcr-pull}]` and create the corresponding
# dockerconfigjson Secret in the target namespace.
imagePullSecrets: []

# cracha-controller + cracha-api co-deployed in one Pod, share the
# in-memory authz index via Arc<RwLock<...>>. Single replica is
# acceptable — the index rebuilds from the live cluster state on
# restart; the data plane (vigia) caches decisions for 5 minutes.
replicas: 1

logLevel: "info"

serviceAccount:
  create: true
  name: ""

resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# Postgres connection — points at a SOPS-encrypted Secret containing
# the libpq URL under `database-url` by default. Override at the
# HelmRelease level to point at any cluster's CNPG instance. Required
# at runtime; cracha-api refuses to start without it.
database:
  secretName: cracha-db
  secretKey: database-url

# Admin allowlist — comma-separated lowercase emails. Users whose
# Google login email matches one of these get the admin role on every
# login. Promotion/demotion = edit this string and reconcile; never a
# runtime mutation.
adminEmails: ""

# Extra env vars passed verbatim to the cracha-api container.
extraEnv: []

ingress:
  enabled: true
  className: nginx
  hostname: cracha.quero.cloud

cloudflared:
  expose: true
  hostname: cracha.quero.cloud

# Saguão self-reference: crachá is gated by passaporte.
compliance:
  authn:
    oidc:
      provider: authentik
      group: operators

serviceMonitor:
  enabled: true
  interval: 30s
